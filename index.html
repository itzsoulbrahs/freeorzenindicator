.site-wrapper {
  align-items: center;
  display: flex;
  flex-direction: column;
  justify-content: center;
  min-height: 100vh;
  position: relative;
  z-index: 2;
  width: 100%;
  padding: 2rem 1rem;
}

.card {
  width: 100%;
  max-width: 50rem;
  position: relative;
  box-shadow: 0 8px 40px rgba(0,0,0,0.5);
}

.card-top {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  min-height: 20rem;
  padding: 3.5rem 4rem;
  background: linear-gradient(160deg, #1c1c2e 0%, #16213e 50%, #0f3460 100%);
  border-radius: 2.5rem 2.5rem 0 0;
  gap: 1rem;
}

.brand-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.75rem;
  margin-bottom: 0.25rem;
}

.brand-icon {
  width: 2.6rem;
  height: 2.6rem;
  background: rgba(255,255,255,0.06);
  border: 1.5px solid rgba(255,255,255,0.18);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}

.brand-icon svg { width: 1.3rem; height: 1.3rem; }

.company-name {
  font-family: 'Audiowide', sans-serif;
  font-size: 0.8em;
  color: rgba(255,255,255,0.45);
  letter-spacing: 0.2em;
  text-transform: uppercase;
}

.card-title {
  font-family: 'Audiowide', sans-serif;
  font-size: 2.2em;
  color: #ffffff;
  letter-spacing: -0.03em;
  line-height: 1.3;
  text-transform: uppercase;
}

.card-subtitle {
  font-family: 'Inter', sans-serif;
  font-size: 0.9em;
  font-weight: 300;
  color: rgba(255,255,255,0.45);
  line-height: 1.8;
  max-width: 28rem;
}

.card-bottom {
  background: #1a1a1f;
  border-top: 1px solid rgba(255,255,255,0.05);
  border-radius: 0 0 2.5rem 2.5rem;
  padding: 2rem 4rem 2.5rem;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1rem;
}

.form-label {
  font-family: 'Lato', sans-serif;
  font-size: 1em;
  color: rgba(255,255,255,0.4);
  text-align: center;
}

.input-row {
  display: flex;
  width: 100%;
  max-width: 26rem;
  gap: 0.6rem;
}

.email-input {
  flex: 1;
  height: 3.2rem;
  padding: 0 1.2rem;
  font-family: 'Inter', sans-serif;
  font-size: 0.9em;
  font-weight: 400;
  color: #e0e0e0;
  background: #111114;
  border: 1.5px solid rgba(255,255,255,0.1);
  border-radius: 2.5rem;
  outline: none;
  transition: border-color 0.2s ease;
  appearance: none;
  -webkit-appearance: none;
}

.email-input:focus { border-color: rgba(255,255,255,0.3); }
.email-input::placeholder { color: rgba(255,255,255,0.18); }

.submit-btn {
  height: 3.2rem;
  padding: 0 1.6rem;
  font-family: 'Inter', sans-serif;
  font-size: 0.9em;
  font-weight: 500;
  color: #ffffff;
  background: #2a2a35;
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 2.5rem;
  cursor: pointer;
  white-space: nowrap;
  transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease;
}

.submit-btn:hover { transform: scale(1.05); background: #363645; border-color: rgba(255,255,255,0.25); }
.submit-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

.status-msg {
  font-family: 'Inter', sans-serif;
  font-size: 0.82em;
  font-weight: 400;
  min-height: 1.2em;
  text-align: center;
  color: #6dbf78;
  display: none;
}

.status-msg.error { color: #d96060; }
.status-msg.visible { display: block; }

@media (max-width: 1680px) { html { font-size: 12pt; } }
@media (max-width: 980px)  { html { font-size: 10pt; } }
@media (max-width: 736px) {
  html { font-size: 12pt; }
  .card-top { padding: 2.5rem 2rem; min-height: unset; max-height: unset; border-radius: 2.5rem 2.5rem 0 0; }
  .card-title { font-size: 1.8em; }
  .card-bottom { padding: 1.5rem 1.5rem 2rem; }
  .input-row { flex-direction: column; align-items: center; max-width: 100%; gap: 0.75rem; }
  .email-input { width: 100%; max-width: 20rem; height: 3.5rem !important; min-height: 3.5rem !important; font-size: 1em; padding: 0 1.4rem; }
  .submit-btn { width: 100%; max-width: 20rem; height: 3.8rem; font-size: 1em; }
}
@media (max-width: 360px) {
  .card-top { padding: 2rem 1.5rem; }
  .card-title { font-size: 1.5em; }
  .card-bottom { padding: 1.25rem 1.25rem 1.75rem; }
}

<body>

<div class="site-wrapper">
  <div class="card">
    <div class="card-top">
      <div class="brand-row">
        <div class="brand-icon">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="none">
            <path d="M3 3v18h18M7 16l4-4 4 4 4-6" stroke="rgba(255,255,255,0.6)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="company-name">Orzen Labs</span>
      </div>
      <h1 class="card-title">Free TradingView Indicator</h1>
      <p class="card-subtitle">Enter your email and the files will be sent to you automatically.</p>
    </div>

    <div class="card-bottom">
      <p class="form-label">Get instant access — it's free</p>
      <div class="input-row">
        <input type="email" class="email-input" id="emailInput" placeholder="your@email.com" />
        <button class="submit-btn" id="submitBtn" onclick="sendEmail()">Send</button>
      </div>
      <p class="status-msg" id="statusMsg"></p>
    </div>
  </div>
</div>

<script>
async function sendEmail() {
  const emailInput = document.getElementById('emailInput');
  const submitBtn  = document.getElementById('submitBtn');
  const statusMsg  = document.getElementById('statusMsg');
  const email      = emailInput.value.trim();

  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    statusMsg.textContent = 'Please enter a valid email address.';
    statusMsg.className = 'status-msg error visible';
    return;
  }

  submitBtn.disabled = true;
  submitBtn.textContent = 'Sending...';
  statusMsg.className = 'status-msg';

  try {
    const res = await fetch('/api/send', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });

    if (res.ok) {
      statusMsg.textContent = '✓ Check your inbox — email sent!';
      statusMsg.className = 'status-msg visible';
      emailInput.value = '';
    } else {
      const data = await res.json();
      throw new Error(data.message || 'Failed to send.');
    }
  } catch (err) {
    statusMsg.textContent = 'Something went wrong. Please try again.';
    statusMsg.className = 'status-msg error visible';
  } finally {
    submitBtn.disabled = false;
    submitBtn.textContent = 'Send';
  }
}

document.getElementById('emailInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') sendEmail();
});
</script>
